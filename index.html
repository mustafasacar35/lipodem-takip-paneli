
<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>Hasta Listesi</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h2>Hasta Listesi</h2>
  <div>
    <button onclick="yeniHasta()">➕ Yeni Hasta Ekle</button>
    <input type="text" id="arama" placeholder="Hasta ara..." oninput="guncelleListe()" />
    <button onclick="arsivModu(true)">📦 Arşivlenmiş Hastaları Göster</button>
    <button onclick="arsivModu(false)">🏠 Aktif Hastaları Göster</button>
  </div>
  <div id="hasta-listesi"></div>

  <template id="hasta-karti">
    <div class="hasta-karti">
      <span class="isim"></span>
      <span class="hafta"></span>
      <button class="detay">👁</button>
      <button class="duzenle">✏️</button>
      <button class="arsivle">📦</button>
    </div>
  </template>

  <script src="hasta_yonetim.js"></script>
</body>
</html>
