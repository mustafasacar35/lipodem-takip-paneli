
<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>Tarif Eşleştirme Paneli</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f7f7f7; }
    textarea, input[type="file"] { width: 100%; margin-bottom: 10px; }
    button { padding: 10px 20px; }
    .matched img { width: 150px; margin: 5px; border: 1px solid #ccc; }
  </style>
</head>
<body>

  <h2>Lipedem Hasta Takip Sistemi</h2>
  <div style="margin-bottom:10px;">
    <button onclick="exportData()">Verileri Dışa Aktar (JSON)</button>
    <input type="file" id="importFile" style="display:none" accept="application/json" onchange="importData(event)">
    <button onclick="document.getElementById('importFile').click()">Veri Yükle (JSON)</button>
    <input type="password" id="githubToken" placeholder="GitHub API Token" style="width:220px;" oninput="saveTokenToStorage()">
    <button onclick="uploadToGitHub()" id="githubSaveBtn">GitHub'a Kaydet</button>
  </div>
  <div id="hastaPaneli">
    <h3>Hasta Listesi</h3>
    <input type="text" id="hastaAra" placeholder="İsme göre ara..." oninput="filtreleHastalar()" style="width:200px;">
    <select id="arsivFiltre" onchange="filtreleHastalar()">
      <option value="aktif">Aktif Hastalar</option>
      <option value="arsiv">Arşivdekiler</option>
      <option value="tum">Tümü</option>
    </select>
    <button onclick="yeniHastaFormu()">Yeni Hasta Ekle</button>
    <ul id="hastaListesi"></ul>
  </div>

  <div id="hastaFormu" style="display:none; background:#fff; border:1px solid #ccc; padding:16px; margin:16px 0;">
    <h3 id="hastaFormBaslik">Yeni Hasta</h3>
    <input id="hastaIsim" placeholder="İsim" style="width:200px;"/><br>
    <textarea id="hastaNot" placeholder="Özel Notlar" style="width:200px;"></textarea><br>
    <button onclick="kaydetHasta()">Kaydet</button>
    <button onclick="iptalHastaFormu()">İptal</button>
  </div>

  <div id="hastaDetay" style="display:none; background:#f9f9f9; border:1px solid #ccc; padding:16px; margin:16px 0;">
    <h3 id="detayIsim"></h3>
    <div id="detayNot"></div>
    <button onclick="duzenleHasta()">Düzenle</button>
    <button onclick="arsivleHasta()" id="arsivBtn"></button>
    <button onclick="silHasta()">Sil</button>
    <button onclick="kapatDetay()">Kapat</button>
    <hr>
    <div style="margin:10px 0; background:#eef; padding:8px;">
      <b>Genel Bilgiler / Notlar:</b>
      <div id="hastaGenelNot"></div>
    </div>
    <div style="margin:10px 0;">
      <h4>Haftalar</h4>
      <button onclick="haftaEkle()">Hafta Ekle</button>
      <div id="haftaListesi"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <script>
    // --- GitHub'a JSON dosyası kaydetme fonksiyonu ---
    // Token'ı localStorage'da sakla ve input'a yükle
    const TOKEN_KEY = 'github_api_token';
    function saveTokenToStorage() {
      const val = document.getElementById('githubToken').value;
      localStorage.setItem(TOKEN_KEY, val);
      updateGithubSaveBtn();
    }
    function loadTokenFromStorage() {
      return localStorage.getItem(TOKEN_KEY) || '';
    }
    function updateGithubSaveBtn() {
      const btn = document.getElementById('githubSaveBtn');
      const token = document.getElementById('githubToken').value;
      btn.disabled = !token;
    }
    // Sayfa açılışında token input'u doldur
    window.addEventListener('DOMContentLoaded', function() {
      const token = loadTokenFromStorage();
      const input = document.getElementById('githubToken');
      if (input) input.value = token;
      updateGithubSaveBtn();
    });

    async function uploadToGitHub() {
      const token = document.getElementById('githubToken').value.trim();
      if (!token) { alert('Lütfen önce GitHub API token girin!'); return; }
      const owner = 'mustafasacar35'; // GitHub kullanıcı adın
      const repo = 'lipodem-takip-paneli'; // Repo adı
      const path = 'data/hasta_kayitlari.json'; // Dosya yolu (repo içinde data/ klasörü olmalı)
      const branch = 'main'; // Branch adı

      // Önce mevcut dosyanın SHA'sını al (güncelleme için gerekli)
      let sha = undefined;
      try {
        const resp = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${branch}`, {
          headers: { Authorization: `token ${token}` }
        });
        if (resp.ok) {
          const data = await resp.json();
          sha = data.sha;
        }
      } catch (e) {}

      // Sadece eşleşen kart isimleri, hafta numarası ve tarih ile yeni bir veri yapısı oluştur
      const now = new Date().toISOString();
      const exportData = hastalar.map(hasta => {
        return {
          id: hasta.id,
          isim: hasta.isim,
          arsiv: hasta.arsiv,
          haftalar: (hasta.haftalar || []).map((hafta, idx) => {
            // Eşleşen kart isimleri (tarifKartlar)
            const kartIsimleri = (hafta.tarifKartlar || []).map(k => k.name);
            return {
              haftaNo: idx + 1,
              kayitTarihi: now,
              kartlar: kartIsimleri
            };
          })
        };
      });
      const content = btoa(unescape(encodeURIComponent(JSON.stringify(exportData, null, 2))));

      // Dosyayı yükle
      const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
        method: 'PUT',
        headers: {
          'Authorization': `token ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          message: 'Hasta kayıtları güncellendi',
          content,
          branch,
          sha
        })
      });
      if (res.ok) {
        alert('GitHub\'a başarıyla kaydedildi!');
      } else {
        alert('GitHub kaydı başarısız: ' + (await res.text()));
      }
    }
    // --- Tarifler klasörü görsellerini otomatik yükle (GitHub Pages uyumlu) ---
    let tariflerKlasoruGorselleri = [];
    async function tariflerKlasoruGorselleriniYukle() {
      try {
        // Her zaman bulunduğun dizinin köküne göre tarifler/ yolunu oluştur
        let basePath = window.location.pathname;
        if (!basePath.endsWith('/')) basePath = basePath.substring(0, basePath.lastIndexOf('/') + 1);
        const tariflerPath = window.location.origin + basePath + 'tarifler/';
        const resp = await fetch(tariflerPath + 'list.json');
        if (!resp.ok) throw new Error('list.json bulunamadı: ' + resp.status);
        const files = await resp.json();
        tariflerKlasoruGorselleri = files.map(name => ({
          name,
          url: tariflerPath + name
        }));
      } catch (e) {
        console.error('tariflerKlasoruGorselleriniYukle Hatası:', e);
        tariflerKlasoruGorselleri = [];
      }
    }
    tariflerKlasoruGorselleriniYukle();

    // pdf.js worker ayarı (uyumluluk için)
    if (window['pdfjsLib']) {
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    }
    // --- Hasta Yönetimi Modülü ---
    // --- Kalıcı veri yönetimi ---
    const STORAGE_KEY = 'lipedem_hasta_kayitlari';
    function saveToStorage() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(hastalar));
      } catch(e) { console.error('localStorage kaydetme hatası:', e); }
    }
    function loadFromStorage() {
      try {
        const data = localStorage.getItem(STORAGE_KEY);
        if (data) return JSON.parse(data);
      } catch(e) { console.error('localStorage okuma hatası:', e); }
      return null;
    }

    // Başlangıç verisi veya storage'dan yükle
    let hastalar = loadFromStorage() || [
      { id: 1, isim: "Ayşe Yılmaz", not: "Hashimoto tiroiditi var", arsiv: false },
      { id: 2, isim: "Fatma Demir", not: "Zeytin sevmez", arsiv: false },
      { id: 3, isim: "Zeynep Kaya", not: "3. haftada kabızlık yaşandı", arsiv: true }
    ];
    let seciliHasta = null;
    let duzenlemeModu = false;
    let duzenlenenId = null;

    function renderHastalar() {
      const ul = document.getElementById('hastaListesi');
      const ara = document.getElementById('hastaAra').value.toLowerCase();
      const filtre = document.getElementById('arsivFiltre').value;
      ul.innerHTML = '';
      hastalar.filter(h =>
        (filtre === 'tum' || (filtre === 'arsiv' ? h.arsiv : !h.arsiv)) &&
        h.isim.toLowerCase().includes(ara)
      ).forEach(hasta => {
        const li = document.createElement('li');
        li.textContent = hasta.isim + (hasta.arsiv ? ' (Arşiv)' : '');
        li.style.cursor = 'pointer';
        li.onclick = () => hastaDetayGoster(hasta.id);
        ul.appendChild(li);
      });
    }

    function filtreleHastalar() { renderHastalar(); }

    function yeniHastaFormu() {
      duzenlemeModu = false;
      duzenlenenId = null;
      document.getElementById('hastaFormBaslik').textContent = 'Yeni Hasta';
      document.getElementById('hastaIsim').value = '';
      document.getElementById('hastaNot').value = '';
      document.getElementById('hastaFormu').style.display = 'block';
      document.getElementById('hastaDetay').style.display = 'none';
    }

    function kaydetHasta() {
      const isim = document.getElementById('hastaIsim').value.trim();
      const not = document.getElementById('hastaNot').value.trim();
      if (!isim) { alert('İsim zorunlu!'); return; }
      if (duzenlemeModu && duzenlenenId != null) {
        const h = hastalar.find(h => h.id === duzenlenenId);
        h.isim = isim; h.not = not;
      } else {
        const yeni = { id: Date.now(), isim, not, arsiv: false };
        hastalar.push(yeni);
      }
      document.getElementById('hastaFormu').style.display = 'none';
      saveToStorage();
      renderHastalar();
    }

    function iptalHastaFormu() {
      document.getElementById('hastaFormu').style.display = 'none';
    }

    function hastaDetayGoster(id) {
      seciliHasta = hastalar.find(h => h.id === id);
      if (!seciliHasta) return;
      document.getElementById('detayIsim').textContent = seciliHasta.isim;
      document.getElementById('detayNot').textContent = seciliHasta.not;
      document.getElementById('arsivBtn').textContent = seciliHasta.arsiv ? 'Arşivden Çıkar' : 'Arşivle';
      document.getElementById('hastaDetay').style.display = 'block';
      document.getElementById('hastaFormu').style.display = 'none';
    }

    function duzenleHasta() {
      if (!seciliHasta) return;
      duzenlemeModu = true;
      duzenlenenId = seciliHasta.id;
      document.getElementById('hastaFormBaslik').textContent = 'Hasta Düzenle';
      document.getElementById('hastaIsim').value = seciliHasta.isim;
      document.getElementById('hastaNot').value = seciliHasta.not;
      document.getElementById('hastaFormu').style.display = 'block';
      document.getElementById('hastaDetay').style.display = 'none';
    }

    function arsivleHasta() {
      if (!seciliHasta) return;
      seciliHasta.arsiv = !seciliHasta.arsiv;
      document.getElementById('hastaDetay').style.display = 'none';
      saveToStorage();
      renderHastalar();
    }

    function silHasta() {
      if (!seciliHasta) return;
      if (!confirm('Silmek istediğinize emin misiniz?')) return;
      hastalar = hastalar.filter(h => h.id !== seciliHasta.id);
      saveToStorage();
      document.getElementById('hastaDetay').style.display = 'none';
      renderHastalar();
    }

    function kapatDetay() {
      document.getElementById('hastaDetay').style.display = 'none';
    }


    // --- Hasta Haftaları ---
    function getHaftaListesi() {
      if (!seciliHasta) return [];
      if (!seciliHasta.haftalar) seciliHasta.haftalar = [];
      return seciliHasta.haftalar;
    }

    function haftaEkle() {
      if (!seciliHasta) return;
      if (!seciliHasta.haftalar) seciliHasta.haftalar = [];
      let startDate = null;
      if (seciliHasta.haftalar.length > 0) {
        // Son haftanın pazarından bir gün sonrası
        const last = seciliHasta.haftalar[seciliHasta.haftalar.length-1];
        startDate = new Date(new Date(last.baslangic).getTime() + 7*24*60*60*1000);
      } else {
        // İlk hafta için bugünün pazartesisi
        const now = new Date();
        const day = now.getDay();
        const diff = (day === 0 ? -6 : 1) - day; // Pazartesiye çek
        startDate = new Date(now.getFullYear(), now.getMonth(), now.getDate() + diff);
      }
      const endDate = new Date(startDate.getTime() + 6*24*60*60*1000);
      seciliHasta.haftalar.push({
        baslangic: startDate.toISOString().slice(0,10),
        bitis: endDate.toISOString().slice(0,10),
        aciklama: '',
        pdf: null,
        tarifKartlar: [],
        tarifler: [],
        gptMesaj: ''
      });
      saveToStorage();
      gosterHaftalar();
    }

    function gosterHaftalar() {
      const div = document.getElementById('haftaListesi');
      div.innerHTML = '';
      const haftalar = getHaftaListesi();
      haftalar.forEach((hafta, i) => {
        const haftaDiv = document.createElement('div');
        haftaDiv.style = 'border:1px solid #ccc; margin:8px 0; padding:8px; background:#f8f8ff;';
        haftaDiv.innerHTML =
          `<b>${i+1}. Hafta</b> (${hafta.baslangic} - ${hafta.bitis})
          <input type="text" id="aciklama_${i}" value="${hafta.aciklama||''}" placeholder="Açıklama" style="margin-left:8px;width:180px;">
          <button onclick="aciklamaKaydet(${i})">Kaydet</button>
          <button onclick="duzenleHafta(${i})">Düzenle</button>
          <button onclick="silHafta(${i})" style="color:red;">Sil</button><br>
          <b>PDF:</b> <input type="file" accept="application/pdf" onchange="pdfYukleHafta(${i}, this)">
          <ul id="haftaTarifListesi_${i}" style="display:none;"></ul>
          <b>Tarif Kartı (manuel yükleme):</b> <input type="file" accept="image/jpeg,image/jpg,image/png" multiple onchange="tarifKartYukleHafta(${i}, this)">
          <div id="haftaKartGorsel_${i}"></div>
          <div id="eslesenKartlar_${i}"></div>
          <b>GPT Mesajı:</b><br>
          <textarea id="gptMesaj_${i}" rows="2" style="width:98%;">${hafta.gptMesaj||''}</textarea>
          <button onclick="gptMesajKaydet(${i})">Kaydet</button>
          <button onclick="kopyalaGptMesaj(${i})">Kopyala</button>`;
        div.appendChild(haftaDiv);
        gosterTariflerHafta(i); // transkript gizli
        gosterKartlarHafta(i);
        // Eğer PDF yüklü ve tarifler yoksa otomatik tara ve eşleştir
        if (hafta.pdf && (!hafta.tarifler || hafta.tarifler.length === 0)) {
          pdfOkuVeEsleHafta(i);
        } else if (hafta.tarifler && hafta.tarifler.length > 0) {
          otomatikEsleHafta(i);
        }
      });
    }

// Hafta açıklama kaydet
function aciklamaKaydet(i) {
  const haftalar = getHaftaListesi();
  haftalar[i].aciklama = document.getElementById('aciklama_' + i).value;
  saveToStorage();
  alert('Açıklama kaydedildi.');
}

// Hafta sil
function silHafta(i) {
  if (!confirm('Bu haftayı silmek istediğinize emin misiniz?')) return;
  const haftalar = getHaftaListesi();
  haftalar.splice(i, 1);
  saveToStorage();
  gosterHaftalar();
}

// Hafta düzenle (tarih ve açıklama)
function duzenleHafta(i) {
  const haftalar = getHaftaListesi();
  const hafta = haftalar[i];
  const yeniBaslangic = prompt('Yeni başlangıç tarihi (YYYY-MM-DD):', hafta.baslangic);
  if (!yeniBaslangic) return;
  const yeniBitis = prompt('Yeni bitiş tarihi (YYYY-MM-DD):', hafta.bitis);
  if (!yeniBitis) return;
  hafta.baslangic = yeniBaslangic;
  hafta.bitis = yeniBitis;
  hafta.aciklama = document.getElementById('aciklama_' + i).value;
  saveToStorage();
  gosterHaftalar();
}

    function pdfYukleHafta(i, input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        const haftalar = getHaftaListesi();
        haftalar[i].pdf = e.target.result;
        haftalar[i].pdfName = file.name || 'hafta.pdf';
        saveToStorage();
        // PDF yüklenir yüklenmez otomatik tara ve eşleştir
        pdfOkuVeEsleHafta(i);
      };
      reader.readAsDataURL(file);
    }

    // PDF'den otomatik tara ve eşleştir
    async function pdfOkuVeEsleHafta(i) {
      const hafta = getHaftaListesi()[i];
      if (!hafta.pdf) return;
      const base64 = hafta.pdf.split(',')[1];
      const binary = atob(base64);
      const len = binary.length;
      const bytes = new Uint8Array(len);
      for (let j = 0; j < len; j++) bytes[j] = binary.charCodeAt(j);
      const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
      let fullText = '';
      for (let p = 1; p <= pdf.numPages; p++) {
        const page = await pdf.getPage(p);
        const content = await page.getTextContent();
        const strings = content.items.map(item => item.str);
        fullText += strings.join('\n') + '\n';
      }
      hafta.tarifler = extractTariflerDetay(fullText);
      saveToStorage();
      // Otomatik eşleştir
      otomatikEsleHafta(i);
    }

    // pdfOkuHafta fonksiyonu artık kullanılmıyor (otomatikleştirildi)

    function gosterTariflerHafta(i) {
      const hafta = getHaftaListesi()[i];
      const ul = document.getElementById('haftaTarifListesi_' + i);
      if (!ul) return;
      ul.innerHTML = '';
      (hafta.tarifler||[]).forEach(t => {
        const li = document.createElement('li');
        li.textContent = t;
        ul.appendChild(li);
      });
    }

    function tarifKartYukleHafta(i, input) {
      const hafta = getHaftaListesi()[i];
      hafta.tarifKartlar = [];
      const gorselDiv = document.getElementById('haftaKartGorsel_' + i);
      gorselDiv.innerHTML = '';
      Array.from(input.files).forEach(file => {
        const reader = new FileReader();
        reader.onload = function (e) {
          hafta.tarifKartlar.push({ name: file.name, data: e.target.result });
          const img = document.createElement('img');
          img.src = e.target.result;
          img.alt = file.name;
          img.style.width = '100px';
          img.style.margin = '4px';
          gorselDiv.appendChild(img);
          saveToStorage();
        };
        reader.readAsDataURL(file);
      });
    }

    function gosterKartlarHafta(i) {
      const hafta = getHaftaListesi()[i];
      const gorselDiv = document.getElementById('haftaKartGorsel_' + i);
      if (!gorselDiv) return;
      gorselDiv.innerHTML = '';
      (hafta.tarifKartlar||[]).forEach(kart => {
        const img = document.createElement('img');
        img.src = kart.data;
        img.alt = kart.name;
        img.style.width = '100px';
        img.style.margin = '4px';
        gorselDiv.appendChild(img);
      });
    }

    async function otomatikEsleHafta(i) {
  // Tarif satırından alternatifli yemek adlarını ayıkla
  function extractYemekAdlari(satir) {
    // Baştaki * ve miktarları temizle
    let s = satir.replace(/^\*+\s*/, '');
    // Parantez içini, + ile eklenenleri, miktarları temizle
    s = s.replace(/\(.*?\)/g, '');
    s = s.replace(/\+.*$/, '');
    s = s.replace(/([0-9]+\s*(gram|gr|adet|yemek\s*kaşığı|tatlı\s*kaşığı|su\s*bardağı|dilim|kase|çay\s*bardağı|bardak|kaşık|tbsp|tsp|ml|kg|g))($|\s)/gi, '');
    s = s.replace(/(istenilen baharatlarla|istenirse|isteğe bağlı|arzuya göre|isteğe göre|isteğe bağlı olarak|isteğe göre baharat|isteğe göre malzeme|isteğe göre eklenebilir)/gi, '');
    
    // Önce "ya da", "veya" ile ayrılmış alternatifleri ayır
    let alternatifler = s.split(/\s*(ya da|veya)\s*/i).map(a => a.trim()).filter(a => a.length > 0);
    let tumAdlar = [];
    
    // Her alternatif için ayrı işlem yap
    alternatifler.forEach(alt => {
      // "ile", "için", "ve" kelimelerini temizle
      alt = alt.replace(/\b(ile|için|ve)\b/gi, '');
      // "/" ve "," ile ayrılmış alt seçenekleri de ayır
      let adlar = alt.split(/\s*[\/|,]\s*/).map(a => a.trim()).filter(a => a.length > 0);
      // Sadece ana yemek adını ayıkla: baştaki ve sondaki boşlukları, miktarları, "için" ve fazlalıkları sil
      adlar = adlar.map(a => a.replace(/^[0-9]+\s*/, '').replace(/\s*[0-9]+\s*(gram|gr|adet|dilim|kase|bardak|ml|kg|tsp|tbsp)?\s*$/i, '').replace(/\s*icin?$/i, '').replace(/\s*ile$/i, '').trim());
      // Çok kısa (1 kelime) olanları at
      adlar = adlar.filter(a => a.split(' ').length > 0);
      tumAdlar = tumAdlar.concat(adlar);
    });
    
    return tumAdlar;
  }
  // Dosya adındaki miktar ve açıklama kelimelerini temizle
  function temizleDosyaAdi(ad) {
    let s = ad.replace(/\.(jpg|jpeg|png)$/i, '');
    s = s.replace(/_\d+(gr|gram|adet|dilim|kase|bardak|ml|kg|tsp|tbsp)?/gi, '');
    s = s.replace(/\(.*?\)/g, '');
    s = s.replace(/_?(istenilen_baharatlarla|istenirse|istege_bagli|arzuya_gore|istege_gore|istege_bagli_olarak|istege_gore_baharat|istege_gore_malzeme|istege_gore_eklenebilir)/gi, '');
    s = s.replace(/_+/g, '_');
    s = s.replace(/\s+/g, '_');
    s = s.replace(/\+.*$/, '');
    return s.trim();
  }
   // Normalize fonksiyonu - sembolleri ve Türkçe karakterleri temizle
  function normalize(str) {
    return str
      .toLowerCase()
      .replace(/ç/g, 'c').replace(/ğ/g, 'g').replace(/ş/g, 's')
      .replace(/ü/g, 'u').replace(/ö/g, 'o').replace(/ı/g, 'i')
      .replace(/i̇/g, 'i')
      .replace(/[_*\/()]/g, ' ')  // Sembolleri boşlukla değiştir
      .replace(/\s+/g, ' ')       // Çoklu boşlukları tek boşluğa çevir
      .replace(/[^a-z0-9\s]/g, '') // Sadece harf, rakam ve boşluk bırak
      .trim();
  }

  // Tarif kartındaki TÜM kelimelerin liste yemeğinde bulunup bulunmadığını kontrol et
  function kartKelimeleriniKontrolEt(kartKelimeler, tarifKelimeler) {
    // Kart kelimelerinin her biri tarif kelimelerinde bulunmalı
    for (let kartKelime of kartKelimeler) {
      let bulundu = false;
      for (let tarifKelime of tarifKelimeler) {
        if (tarifKelime.includes(kartKelime) || kartKelime.includes(tarifKelime)) {
          bulundu = true;
          break;
        }
      }
      if (!bulundu) {
        return false;
      }
    }
    return true;
  }
// Kelime gruplarını kontrol et (3 kelime, 2 kelime) - YENİ: Kart kelimelerini de kontrol et
  function kelimeleriKontrolEt(tarifKelimeler, kartKelimeler) {
    // Önce kart kelimelerinin tamamının tarif kelimelerinde bulunup bulunmadığını kontrol et
    if (!kartKelimeleriniKontrolEt(kartKelimeler, tarifKelimeler)) {
      return { eslesme: false };
    }

    // Tam eşleşme kontrolü
    if (tarifKelimeler.join(' ') === kartKelimeler.join(' ')) {
      return { eslesme: true, tip: 'tam eşleşme', kelimeler: kartKelimeler.join(' ') };
    }

    // 3 ardışık kelime ara
    for (let i = 0; i <= tarifKelimeler.length - 3; i++) {
      const ucKelime = tarifKelimeler.slice(i, i + 3).join(' ');
      for (let j = 0; j <= kartKelimeler.length - 3; j++) {
        const kartUcKelime = kartKelimeler.slice(j, j + 3).join(' ');
        if (ucKelime === kartUcKelime) {
          return { eslesme: true, tip: '3 kelime', kelimeler: ucKelime };
        }
      }
    }

    // 2 ardışık kelime ara
    for (let i = 0; i <= tarifKelimeler.length - 2; i++) {
      const ikiKelime = tarifKelimeler.slice(i, i + 2).join(' ');
      for (let j = 0; j <= kartKelimeler.length - 2; j++) {
        const kartIkiKelime = kartKelimeler.slice(j, j + 2).join(' ');
        if (ikiKelime === kartIkiKelime) {
          return { eslesme: true, tip: '2 kelime', kelimeler: ikiKelime };
        }
      }
    }

    // Eğer kart kelimelerinin tamamı tarif kelimelerinde bulunuyorsa, genel eşleşme kabul et
    return { eslesme: true, tip: 'genel eşleşme', kelimeler: kartKelimeler.join(' ') };
  }

  // Eğer görseller henüz yüklenmediyse, önce yükle
  if (tariflerKlasoruGorselleri.length === 0) {
    await tariflerKlasoruGorselleriniYukle();
  }

  const hafta = getHaftaListesi()[i];
  const eslesenDiv = document.getElementById('eslesenKartlar_' + i);
  eslesenDiv.innerHTML = '';

  if (!hafta.tarifler.length) {
    eslesenDiv.innerHTML = '<i>Önce PDF yükleyin ve tarifleri çıkarın.</i>';
    return;
  }

  // Hem manuel yüklenen hem tarifler klasörü görsellerini birleştir
  const tumKartlar = [].concat(
    hafta.tarifKartlar || [],
    tariflerKlasoruGorselleri.map(g => ({ name: g.name, data: g.url }))
  );

  if (!tumKartlar.length) {
    eslesenDiv.innerHTML = '<i>Önce görselleri yükleyin veya tarifler klasörüne ekleyin.</i>';
    return;
  }


  // Normalize fonksiyonu - sembolleri ve Türkçe karakterleri temizle
  function normalize(str) {
    return str
      .toLowerCase()
      .replace(/ç/g, 'c').replace(/ğ/g, 'g').replace(/ş/g, 's')
      .replace(/ü/g, 'u').replace(/ö/g, 'o').replace(/ı/g, 'i')
      .replace(/i̇/g, 'i')
      .replace(/[_*\/()]/g, ' ')  // Sembolleri boşlukla değiştir
      .replace(/\s+/g, ' ')       // Çoklu boşlukları tek boşluğa çevir
      .replace(/[^a-z0-9\s]/g, '') // Sadece harf, rakam ve boşluk bırak
      .trim();
  }

  // Basit Levenshtein mesafesi (benzerlik için)
  function levenshtein(a, b) {
    const matrix = Array(a.length + 1).fill(null).map(() => Array(b.length + 1).fill(null));
    for (let i = 0; i <= a.length; i++) matrix[i][0] = i;
    for (let j = 0; j <= b.length; j++) matrix[0][j] = j;
    for (let i = 1; i <= a.length; i++) {
      for (let j = 1; j <= b.length; j++) {
        const cost = a[i - 1] === b[j - 1] ? 0 : 1;
        matrix[i][j] = Math.min(
          matrix[i - 1][j] + 1,
          matrix[i][j - 1] + 1,
          matrix[i - 1][j - 1] + cost
        );
      }
    }
    return matrix[a.length][b.length];
  }

  const kullanilanKartlar = new Set();
  let eslesenKartlar = [];
  let eslesmeyenTarifler = [];
  let eslesmeyenOneriler = [];

  // Her tarif için eşleştirme yap
  hafta.tarifler.forEach(tarif => {
    let tarifSatir = tarif.replace(/^\*+\s*/, '').trim();
    let yemekAdlari = extractYemekAdlari(tarifSatir);
    let eslesen = null;
    let eslesenKart = null;
    let eslesenTip = '';
    let enIyiPuan = -1;

    // Her yemek adı için eşleştirme dene
    for (let yemekAdi of yemekAdlari) {
      const tarifNorm = normalize(yemekAdi);
      const tarifKelimeler = tarifNorm.split(' ').filter(k => k.length > 0);

      // Kullanılmayan kartlar arasında ara
      for (let kart of tumKartlar) {
        if (kullanilanKartlar.has(kart.name)) continue;

        const kartNorm = normalize(temizleDosyaAdi(kart.name));
        const kartKelimeler = kartNorm.split(' ').filter(k => k.length > 0);

        // Kelime gruplarını kontrol et
        const kelimeKontrol = kelimeleriKontrolEt(tarifKelimeler, kartKelimeler);
        if (kelimeKontrol.eslesme) {
          let puan = 0;
          switch (kelimeKontrol.tip) {
            case 'tam eşleşme':
              puan = 100;
              break;
            case '3 kelime':
              puan = 50;
              break;
            case '2 kelime':
              puan = 25;
              break;
            case 'genel eşleşme':
              puan = 10;
              break;
          }

          // Daha iyi puan varsa güncelle
          if (puan > enIyiPuan) {
            enIyiPuan = puan;
            eslesen = kart;
            eslesenKart = kart;
            eslesenTip = kelimeKontrol.tip;
          }
        }
      }
    }

    // Eşleşme bulunduysa kaydet ve kartı kullanılmış olarak işaretle
    if (eslesen && eslesenKart && !kullanilanKartlar.has(eslesenKart.name)) {
      kullanilanKartlar.add(eslesenKart.name);
      eslesenKartlar.push({ 
        tarif: tarif, 
        kart: eslesenKart, 
        tip: eslesenTip 
      });
    } else {
      eslesmeyenTarifler.push(tarif);
    }
  });

  // Sonuçları göster
  if (eslesenKartlar.length === 0) {
    eslesenDiv.innerHTML = '<p>Eşleşme bulunamadı.</p>';
  } else {
    // Aynı tarif birden fazla kez gösterilmesin
    const yazilanTarifler = new Set();
    eslesenKartlar.forEach(({ tarif, kart, tip }) => {
      const tarifKey = tarif.toLowerCase().replace(/\s+/g, ' ').trim();
      if (yazilanTarifler.has(tarifKey)) return;
      yazilanTarifler.add(tarifKey);
      
      const p = document.createElement('p');
      p.innerHTML = `<b>${tarif}</b> → <span style="color:green;">${kart.name}</span> <small style="color:blue;">(${tip})</small>`;
      eslesenDiv.appendChild(p);
      
      const img = document.createElement('img');
      img.src = kart.data;
      img.alt = tarif;
      img.title = kart.name;
      img.style.width = '120px';
      img.style.margin = '4px';
      eslesenDiv.appendChild(img);
    });
    
   // ZIP olarak indir butonu ekle
    const zipBtn = document.createElement('button');
    zipBtn.textContent = 'Eşleşenleri ZIP olarak indir';
    zipBtn.onclick = function() { zipEslesenGorseller(i); };
    eslesenDiv.appendChild(document.createElement('br'));
    eslesenDiv.appendChild(zipBtn);
  }

  // Eşleşmeyen tarifleri akordiyon başlık altında göster
  if (eslesmeyenTarifler.length > 0) {
    // Akordiyon başlık
    const akordiyonBaslik = document.createElement('button');
    akordiyonBaslik.textContent = `Eşleşmeyen Tarifler (${eslesmeyenTarifler.length})`;
    akordiyonBaslik.style.background = '#f8d7da';
    akordiyonBaslik.style.color = 'darkred';
    akordiyonBaslik.style.border = '1px solid #d9534f';
    akordiyonBaslik.style.padding = '8px 16px';
    akordiyonBaslik.style.marginTop = '12px';
    akordiyonBaslik.style.cursor = 'pointer';
    akordiyonBaslik.style.fontWeight = 'bold';
    akordiyonBaslik.style.borderRadius = '6px';
    akordiyonBaslik.setAttribute('aria-expanded', 'false');

    // Akordiyon içerik
    const akordiyonIcerik = document.createElement('div');
    akordiyonIcerik.style.display = 'none';
    akordiyonIcerik.style.background = '#fff0f0';
    akordiyonIcerik.style.border = '1px solid #d9534f';
    akordiyonIcerik.style.padding = '10px 16px';
    akordiyonIcerik.style.marginTop = '4px';
    akordiyonIcerik.style.borderRadius = '6px';

    eslesmeyenTarifler.forEach(tarif => {
      const p = document.createElement('p');
      p.textContent = tarif;
      p.style.color = 'red';
      p.style.margin = '6px 0';
      akordiyonIcerik.appendChild(p);
    });

    akordiyonBaslik.onclick = function() {
      const acikMi = akordiyonIcerik.style.display === 'block';
      akordiyonIcerik.style.display = acikMi ? 'none' : 'block';
      akordiyonBaslik.setAttribute('aria-expanded', acikMi ? 'false' : 'true');
    };

    eslesenDiv.appendChild(akordiyonBaslik);
    eslesenDiv.appendChild(akordiyonIcerik);
  }

  // SADECE eşleşen kartları hafta verisine kaydet (manuel yüklenenlerden temizle)
  hafta.tarifKartlar = eslesenKartlar.map(e => e.kart).filter(k => hafta.tarifKartlar && hafta.tarifKartlar.some(hk => hk.name === k.name));
  
  // Eşleşen kartları göster
  gosterKartlarHafta(i);
  
  saveToStorage();
}

    function gptMesajKaydet(i) {
      const hafta = getHaftaListesi()[i];
      hafta.gptMesaj = document.getElementById('gptMesaj_' + i).value;
      saveToStorage();
      alert('Mesaj kaydedildi.');
    // --- JSON dışa aktar/yükle fonksiyonları ---
    function exportData() {
      const dataStr = JSON.stringify(hastalar, null, 2);
      const blob = new Blob([dataStr], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'hasta_kayitlari.json';
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
    }

    function importData(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          if (Array.isArray(data)) {
            hastalar = data;
            saveToStorage();
            renderHastalar();
            document.getElementById('hastaDetay').style.display = 'none';
            alert('Veriler başarıyla yüklendi!');
          } else {
            alert('Geçersiz JSON formatı!');
          }
        } catch(err) {
          alert('JSON okuma hatası: ' + err);
        }
      };
      reader.readAsText(file);
      event.target.value = '';
    }
    }

    function kopyalaGptMesaj(i) {
      const textarea = document.getElementById('gptMesaj_' + i);
      textarea.select();
      textarea.setSelectionRange(0, 99999); // mobile uyumlu
      document.execCommand('copy');
      alert('GPT mesajı kopyalandı!');
    }
    window.kopyalaGptMesaj = kopyalaGptMesaj;

    // Ortak fonksiyonlar
    function extractTariflerDetay(text) {
      // Her satırı temizle, başında * veya miktar varsa da al
      const lines = text.split('\n').map(line => line.trim()).filter(l => l.length > 1);
      // Satır başında rakam, *, miktar, büyük harf, veya yemek adı olabilecek her şeyi al
      const filtered = lines.filter(l =>
        /^[0-9]+\./.test(l) || // 1. ...
        /^\*/.test(l) || // * ...
        /^[0-9]+\s*(gram|gr|adet|yemek\s*kaşığı|tatlı\s*kaşığı|su\s*bardağı|dilim|kase|çay\s*bardağı|bardak|kaşık|tbsp|tsp|ml|kg|g)/i.test(l) || // miktar ile başlayan
        /^[A-ZİĞÜŞÖÇ]/.test(l) // büyük harf ile başlayan
      );
      // Baştaki numara, * işareti ve fazla boşlukları her zaman temizle
      return filtered.map(line =>
        line
          .replace(/^[0-9]+\.\s*/, '') // baştaki numara
          .replace(/^\*+\s*/, '') // baştaki yıldız
          .replace(/^([0-9]+\s*(gram|gr|adet|yemek\s*kaşığı|tatlı\s*kaşığı|su\s*bardağı|dilim|kase|çay\s*bardağı|bardak|kaşık|tbsp|tsp|ml|kg|g)\s*)+/i, '') // baştaki miktar
          .replace(/\s+/g, ' ') // fazla boşluk
          .trim()
          .toLowerCase()
      );
    }

    function normalizeNameDetay(name) {
      return name
        .toLowerCase()
        .replace(/ç/g, 'c').replace(/ğ/g, 'g').replace(/ş/g, 's')
        .replace(/ü/g, 'u').replace(/ö/g, 'o').replace(/ı/g, 'i')
        .replace(/\s+/g, '_')
        .replace(/[^a-z0-9_]/g, '');
    }

    // Hasta detayını gösterirken haftaları ve genel notu da göster
    function hastaDetayGoster(id) {
      seciliHasta = hastalar.find(h => h.id === id);
      if (!seciliHasta) return;
      document.getElementById('detayIsim').textContent = seciliHasta.isim;
      document.getElementById('detayNot').textContent = seciliHasta.not;
      document.getElementById('arsivBtn').textContent = seciliHasta.arsiv ? 'Arşivden Çıkar' : 'Arşivle';
      document.getElementById('hastaDetay').style.display = 'block';
      document.getElementById('hastaFormu').style.display = 'none';
      document.getElementById('hastaGenelNot').textContent = seciliHasta.not;
      gosterHaftalar();
    }

    // Sayfa açılışında storage'dan yükle ve listele
    renderHastalar();

    async function zipEslesenGorseller(i) {
      const hafta = getHaftaListesi()[i];
      const eslesenDiv = document.getElementById('eslesenKartlar_' + i);
      const imgs = eslesenDiv.querySelectorAll('img');
      if (!imgs.length && !hafta.pdf && !(hafta.gptMesaj && hafta.gptMesaj.trim())) {
        alert('İndirilecek görsel, PDF veya mesaj yok!');
        return;
      }
      const zip = new JSZip();
      for (let img of imgs) {
        const url = img.src;
        const name = img.title || img.alt || 'gorsel.jpg';
        const response = await fetch(url);
        const blob = await response.blob();
        zip.file(name, blob);
      }
      // Eğer hafta.pdf varsa, orijinal adıyla ekle
      let zipName = 'eslesen_gorseller_hafta' + (i+1) + '.zip';
      if (hafta.pdfName) {
        const base64 = hafta.pdf.split(',')[1];
        zip.file(hafta.pdfName, base64, {base64: true});
        zipName = hafta.pdfName.replace(/\.[^.]+$/, '') + '.zip';
        // GPT mesajı varsa, aynı isimle .txt olarak ekle
        if (hafta.gptMesaj && hafta.gptMesaj.trim()) {
          const txtName = hafta.pdfName.replace(/\.[^.]+$/, '.txt');
          zip.file(txtName, hafta.gptMesaj);
        }
      } else if (hafta.gptMesaj && hafta.gptMesaj.trim()) {
        zip.file('gpt_mesaji.txt', hafta.gptMesaj);
      }
      zip.generateAsync({type:'blob'}).then(function(content) {
        saveAs(content, zipName);
      });
    }
    window.zipEslesenGorseller = zipEslesenGorseller;
  </script>
