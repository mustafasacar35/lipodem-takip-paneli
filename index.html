<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>Tarif EĹźleĹźtirme Paneli</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f7f7f7; }
    textarea, input[type="file"] { width: 100%; margin-bottom: 10px; }
    button { padding: 10px 20px; }
    .matched img { width: 150px; margin: 5px; border: 1px solid #ccc; }
  </style>
</head>
<body>

  <h2>Lipedem Hasta Takip Sistemi</h2>
  <div style="margin-bottom:10px;">
    <button onclick="exportData()">Verileri DÄ±Ĺźa Aktar (JSON)</button>
    <input type="file" id="importFile" style="display:none" accept="application/json" onchange="importData(event)">
    <button onclick="document.getElementById('importFile').click()">Veri YĂĽkle (JSON)</button>
    <input type="password" id="githubToken" placeholder="GitHub API Token" style="width:220px;" oninput="saveTokenToStorage()">
    <button onclick="uploadToGitHub()" id="githubSaveBtn">GitHub'a Kaydet</button>
    <button onclick="yeniKartFormGoster()">Yeni Tarif KartÄ± Ekle</button>
  </div>

  <!-- Yeni Kart Ekleme Formu -->
  <div id="yeniKartFormu" style="display:none; background:#fff; border:2px solid #007bff; padding:20px; margin:16px 0; border-radius:8px;">
    <h3>Yeni Tarif KartÄ± Ekle</h3>
    <div style="margin-bottom:15px;">
      <label style="display:block; margin-bottom:5px; font-weight:bold;">Kart AdÄ±:</label>
      <input id="yeniKartAdi" placeholder="Ă–rn: mantarli_tavuk_sote" style="width:300px; padding:8px;" />
      <small style="display:block; color:#666; margin-top:5px;">
        Not: TĂĽrkĂ§e karakterler kullanmayÄ±n, boĹźluk yerine _ kullanÄ±n, .jpg eklemeyin
      </small>
    </div>
    <div style="margin-bottom:15px;">
      <label style="display:block; margin-bottom:5px; font-weight:bold;">GĂ¶rsel DosyasÄ±:</label>
      <input type="file" id="yeniKartDosya" accept="image/jpeg,image/jpg,image/png" style="padding:8px;" />
      <small style="display:block; color:#666; margin-top:5px;">
        Sadece JPG/PNG dosyalarÄ± kabul edilir
      </small>
    </div>
    <div style="margin-bottom:15px;">
      <button onclick="yeniKartKaydet()" style="background:#28a745; color:white; padding:10px 20px; border:none; border-radius:5px; cursor:pointer;">
        KartÄ± Kaydet ve GitHub'a YĂĽkle
      </button>
      <button onclick="yeniKartFormGizle()" style="background:#6c757d; color:white; padding:10px 20px; border:none; border-radius:5px; cursor:pointer; margin-left:10px;">
        Ä°ptal
      </button>
    </div>
    <div id="yuklemeStatus" style="margin-top:15px; padding:10px; border-radius:5px; display:none;"></div>
  </div>
  <div id="hastaPaneli">
    <h3>Hasta Listesi</h3>
    <input type="text" id="hastaAra" placeholder="Ä°sme gĂ¶re ara..." oninput="filtreleHastalar()" style="width:200px;">
    <select id="arsivFiltre" onchange="filtreleHastalar()">
      <option value="aktif">Aktif Hastalar</option>
      <option value="arsiv">ArĹźivdekiler</option>
      <option value="tum">TĂĽmĂĽ</option>
    </select>
    <button onclick="yeniHastaFormu()">Yeni Hasta Ekle</button>
    <ul id="hastaListesi"></ul>
  </div>

  <div id="hastaFormu" style="display:none; background:#fff; border:1px solid #ccc; padding:16px; margin:16px 0;">
    <h3 id="hastaFormBaslik">Yeni Hasta</h3>
    <input id="hastaIsim" placeholder="Ä°sim" style="width:200px;"/><br>
    <textarea id="hastaNot" placeholder="Ă–zel Notlar" style="width:200px;"></textarea><br>
    <button onclick="kaydetHasta()">Kaydet</button>
    <button onclick="iptalHastaFormu()">Ä°ptal</button>
  </div>

  <div id="hastaDetay" style="display:none; background:#f9f9f9; border:1px solid #ccc; padding:16px; margin:16px 0;">
    <h3 id="detayIsim"></h3>
    <div id="detayNot"></div>
    <button onclick="duzenleHasta()">DĂĽzenle</button>
    <button onclick="arsivleHasta()" id="arsivBtn"></button>
    <button onclick="silHasta()">Sil</button>
    <button onclick="kapatDetay()">Kapat</button>
    <hr>
    <div style="margin:10px 0; background:#eef; padding:8px;">
      <b>Genel Bilgiler / Notlar:</b>
      <div id="hastaGenelNot"></div>
    </div>
    <div style="margin:10px 0;">
      <h4>Haftalar</h4>
      <button onclick="haftaEkle()">Hafta Ekle</button>
      <div id="haftaListesi"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <script>
    // --- GitHub'a JSON dosyasÄ± kaydetme fonksiyonu ---
    // Token'Ä± localStorage'da sakla ve input'a yĂĽkle
    const TOKEN_KEY = 'github_api_token';
    function saveTokenToStorage() {
      const val = document.getElementById('githubToken').value;
      localStorage.setItem(TOKEN_KEY, val);
      updateGithubSaveBtn();
    }
    function loadTokenFromStorage() {
      return localStorage.getItem(TOKEN_KEY) || '';
    }
    function updateGithubSaveBtn() {
      const btn = document.getElementById('githubSaveBtn');
      const token = document.getElementById('githubToken').value;
      btn.disabled = !token;
    }
    // Sayfa aĂ§Ä±lÄ±ĹźÄ±nda token input'u doldur
    window.addEventListener('DOMContentLoaded', function() {
      const token = loadTokenFromStorage();
      const input = document.getElementById('githubToken');
      if (input) input.value = token;
      updateGithubSaveBtn();
    });

    async function uploadToGitHub() {
      const token = document.getElementById('githubToken').value.trim();
      if (!token) { alert('LĂĽtfen Ă¶nce GitHub API token girin!'); return; }
      const owner = 'mustafasacar35'; // GitHub kullanÄ±cÄ± adÄ±n
      const repo = 'lipodem-takip-paneli'; // Repo adÄ±
      const path = 'data/hasta_kayitlari.json'; // Dosya yolu (repo iĂ§inde data/ klasĂ¶rĂĽ olmalÄ±)
      const branch = 'main'; // Branch adÄ±

      // Ă–nce mevcut dosyanÄ±n SHA'sÄ±nÄ± al (gĂĽncelleme iĂ§in gerekli)
      let sha = undefined;
      try {
        const resp = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${branch}`, {
          headers: { Authorization: `token ${token}` }
        });
        if (resp.ok) {
          const data = await resp.json();
          sha = data.sha;
        }
      } catch (e) {}

      // Sadece eĹźleĹźen kart isimleri, hafta numarasÄ± ve tarih ile yeni bir veri yapÄ±sÄ± oluĹźtur
      const now = new Date().toISOString();
      const exportData = hastalar.map(hasta => {
        return {
          id: hasta.id,
          isim: hasta.isim,
          arsiv: hasta.arsiv,
          haftalar: (hasta.haftalar || []).map((hafta, idx) => {
            // EĹźleĹźen kart isimleri (tarifKartlar)
            const kartIsimleri = (hafta.tarifKartlar || []).map(k => k.name);
            return {
              haftaNo: idx + 1,
              kayitTarihi: now,
              kartlar: kartIsimleri
            };
          })
        };
      });
      const content = btoa(unescape(encodeURIComponent(JSON.stringify(exportData, null, 2))));

      // DosyayÄ± yĂĽkle
      const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
        method: 'PUT',
        headers: {
          'Authorization': `token ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          message: 'Hasta kayÄ±tlarÄ± gĂĽncellendi',
          content,
          branch,
          sha
        })
      });
      if (res.ok) {
        alert('GitHub\'a baĹźarÄ±yla kaydedildi!');
      } else {
        alert('GitHub kaydÄ± baĹźarÄ±sÄ±z: ' + (await res.text()));
      }
    }

    // --- Yeni Kart Ekleme FonksiyonlarÄ± ---
    function yeniKartFormGoster() {
      const token = document.getElementById('githubToken').value.trim();
      if (!token) {
        alert('Ă–nce GitHub API token girin!');
        return;
      }
      document.getElementById('yeniKartFormu').style.display = 'block';
    }

    function yeniKartFormGizle() {
      document.getElementById('yeniKartFormu').style.display = 'none';
      document.getElementById('yeniKartAdi').value = '';
      document.getElementById('yeniKartDosya').value = '';
      document.getElementById('yuklemeStatus').style.display = 'none';
    }

    function statusGoster(mesaj, tip = 'info') {
      const statusDiv = document.getElementById('yuklemeStatus');
      statusDiv.style.display = 'block';
      statusDiv.innerHTML = mesaj;
      
      if (tip === 'success') {
        statusDiv.style.background = '#d4edda';
        statusDiv.style.color = '#155724';
        statusDiv.style.border = '1px solid #c3e6cb';
      } else if (tip === 'error') {
        statusDiv.style.background = '#f8d7da';
        statusDiv.style.color = '#721c24';
        statusDiv.style.border = '1px solid #f5c6cb';
      } else {
        statusDiv.style.background = '#d1ecf1';
        statusDiv.style.color = '#0c5460';
        statusDiv.style.border = '1px solid #bee5eb';
      }
    }

    async function yeniKartKaydet() {
      const token = document.getElementById('githubToken').value.trim();
      const kartAdi = document.getElementById('yeniKartAdi').value.trim();
      const dosyaInput = document.getElementById('yeniKartDosya');
      
      // Validasyon
      if (!token) {
        alert('GitHub API token gerekli!');
        return;
      }
      
      if (!kartAdi) {
        alert('Kart adÄ± gerekli!');
        return;
      }
      
      if (!dosyaInput.files || !dosyaInput.files[0]) {
        alert('GĂ¶rsel dosyasÄ± seĂ§in!');
        return;
      }

      // Dosya adÄ±nÄ± normalize et
      let dosyaAdi = kartAdi.toLowerCase()
        .replace(/Ă§/g, 'c').replace(/Äź/g, 'g').replace(/Ĺź/g, 's')
        .replace(/ĂĽ/g, 'u').replace(/Ă¶/g, 'o').replace(/Ä±/g, 'i')
        .replace(/\s+/g, '_')
        .replace(/[^a-z0-9_]/g, '');
      
      if (!dosyaAdi.endsWith('.jpg')) {
        dosyaAdi += '.jpg';
      }

      const dosya = dosyaInput.files[0];
      
      try {
        statusGoster('Dosya hazÄ±rlanÄ±yor...', 'info');
        
        // DosyayÄ± base64'e Ă§evir
        const dosyaBase64 = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => {
            const base64 = reader.result.split(',')[1]; // data:image/jpeg;base64, kÄ±smÄ±nÄ± Ă§Ä±kar
            resolve(base64);
          };
          reader.onerror = reject;
          reader.readAsDataURL(dosya);
        });

        const owner = 'mustafasacar35';
        const repo = 'lipodem-takip-paneli';
        const branch = 'main';

        statusGoster('GĂ¶rsel GitHub\'a yĂĽkleniyor...', 'info');

        // 1. Ă–nce gĂ¶rseli tarifler klasĂ¶rĂĽne yĂĽkle
        const gorselPath = `tarifler/${dosyaAdi}`;
        const gorselRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${gorselPath}`, {
          method: 'PUT',
          headers: {
            'Authorization': `token ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            message: `Yeni tarif kartÄ± eklendi: ${dosyaAdi}`,
            content: dosyaBase64,
            branch
          })
        });

        if (!gorselRes.ok) {
          throw new Error('GĂ¶rsel yĂĽkleme baĹźarÄ±sÄ±z: ' + (await gorselRes.text()));
        }

        statusGoster('list.json gĂĽncelleniyor...', 'info');

        // 2. list.json dosyasÄ±nÄ± gĂĽncelle
        // Ă–nce mevcut list.json'u al
        const listRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/tarifler/list.json?ref=${branch}`, {
          headers: { Authorization: `token ${token}` }
        });

        if (!listRes.ok) {
          throw new Error('list.json dosyasÄ± alÄ±namadÄ±');
        }

        const listData = await listRes.json();
        const mevcutListe = JSON.parse(atob(listData.content));
        
        // Yeni dosyayÄ± listeye ekle (eÄźer yoksa)
        if (!mevcutListe.includes(dosyaAdi)) {
          mevcutListe.push(dosyaAdi);
          mevcutListe.sort(); // Alfabetik sÄ±rala
        }

        // GĂĽncellenmiĹź listeyi yĂĽkle
        const yeniListeContent = btoa(JSON.stringify(mevcutListe, null, 2));
        const listUpdateRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/tarifler/list.json`, {
          method: 'PUT',
          headers: {
            'Authorization': `token ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            message: `list.json gĂĽncellendi - ${dosyaAdi} eklendi`,
            content: yeniListeContent,
            sha: listData.sha,
            branch
          })
        });

        if (!listUpdateRes.ok) {
          throw new Error('list.json gĂĽncelleme baĹźarÄ±sÄ±z: ' + (await listUpdateRes.text()));
        }

        statusGoster(`âś… BaĹźarÄ±lÄ±! ${dosyaAdi} kartÄ± eklendi ve list.json gĂĽncellendi.`, 'success');
        
        // Lokal listeyi de gĂĽncelle (anÄ±nda gĂ¶rĂĽnmesi iĂ§in)
        await tariflerKlasoruGorselleriniYukle();
        
        // Formu temizle
        setTimeout(() => {
          yeniKartFormGizle();
        }, 2000);

      } catch (error) {
        console.error('Kart yĂĽkleme hatasÄ±:', error);
        statusGoster(`âťŚ Hata: ${error.message}`, 'error');
      }
    }
    // --- Tarifler klasĂ¶rĂĽ gĂ¶rsellerini otomatik yĂĽkle (GitHub Pages uyumlu) ---
    let tariflerKlasoruGorselleri = [];
    async function tariflerKlasoruGorselleriniYukle() {
      try {
        // Her zaman bulunduÄźun dizinin kĂ¶kĂĽne gĂ¶re tarifler/ yolunu oluĹźtur
        let basePath = window.location.pathname;
        if (!basePath.endsWith('/')) basePath = basePath.substring(0, basePath.lastIndexOf('/') + 1);
        const tariflerPath = window.location.origin + basePath + 'tarifler/';
        const resp = await fetch(tariflerPath + 'list.json');
        if (!resp.ok) throw new Error('list.json bulunamadÄ±: ' + resp.status);
        const files = await resp.json();
        tariflerKlasoruGorselleri = files.map(name => ({
          name,
          url: tariflerPath + name
        }));
      } catch (e) {
        console.error('tariflerKlasoruGorselleriniYukle HatasÄ±:', e);
        tariflerKlasoruGorselleri = [];
      }
    }
    tariflerKlasoruGorselleriniYukle();

    // pdf.js worker ayarÄ± (uyumluluk iĂ§in)
    if (window['pdfjsLib']) {
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    }
    // --- Hasta YĂ¶netimi ModĂĽlĂĽ ---
    // --- KalÄ±cÄ± veri yĂ¶netimi ---
    const STORAGE_KEY = 'lipedem_hasta_kayitlari';
    function saveToStorage() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(hastalar));
      } catch(e) { console.error('localStorage kaydetme hatasÄ±:', e); }
    }
    function loadFromStorage() {
      try {
        const data = localStorage.getItem(STORAGE_KEY);
        if (data) return JSON.parse(data);
      } catch(e) { console.error('localStorage okuma hatasÄ±:', e); }
      return null;
    }

    // BaĹźlangÄ±Ă§ verisi veya storage'dan yĂĽkle
    let hastalar = loadFromStorage() || [
      { id: 1, isim: "AyĹźe YÄ±lmaz", not: "Hashimoto tiroiditi var", arsiv: false },
      { id: 2, isim: "Fatma Demir", not: "Zeytin sevmez", arsiv: false },
      { id: 3, isim: "Zeynep Kaya", not: "3. haftada kabÄ±zlÄ±k yaĹźandÄ±", arsiv: true }
    ];
    let seciliHasta = null;
    let duzenlemeModu = false;
    let duzenlenenId = null;

    function renderHastalar() {
      const ul = document.getElementById('hastaListesi');
      const ara = document.getElementById('hastaAra').value.toLowerCase();
      const filtre = document.getElementById('arsivFiltre').value;
      ul.innerHTML = '';
      hastalar.filter(h =>
        (filtre === 'tum' || (filtre === 'arsiv' ? h.arsiv : !h.arsiv)) &&
        h.isim.toLowerCase().includes(ara)
      ).forEach(hasta => {
        const li = document.createElement('li');
        li.textContent = hasta.isim + (hasta.arsiv ? ' (ArĹźiv)' : '');
        li.style.cursor = 'pointer';
        li.onclick = () => hastaDetayGoster(hasta.id);
        ul.appendChild(li);
      });
    }

    function filtreleHastalar() { renderHastalar(); }

    function yeniHastaFormu() {
      duzenlemeModu = false;
      duzenlenenId = null;
      document.getElementById('hastaFormBaslik').textContent = 'Yeni Hasta';
      document.getElementById('hastaIsim').value = '';
      document.getElementById('hastaNot').value = '';
      document.getElementById('hastaFormu').style.display = 'block';
      document.getElementById('hastaDetay').style.display = 'none';
    }

    function kaydetHasta() {
      const isim = document.getElementById('hastaIsim').value.trim();
      const not = document.getElementById('hastaNot').value.trim();
      if (!isim) { alert('Ä°sim zorunlu!'); return; }
      if (duzenlemeModu && duzenlenenId != null) {
        const h = hastalar.find(h => h.id === duzenlenenId);
        h.isim = isim; h.not = not;
      } else {
        const yeni = { id: Date.now(), isim, not, arsiv: false };
        hastalar.push(yeni);
      }
      document.getElementById('hastaFormu').style.display = 'none';
      saveToStorage();
      renderHastalar();
    }

    function iptalHastaFormu() {
      document.getElementById('hastaFormu').style.display = 'none';
    }

    function hastaDetayGoster(id) {
      seciliHasta = hastalar.find(h => h.id === id);
      if (!seciliHasta) return;
      document.getElementById('detayIsim').textContent = seciliHasta.isim;
      document.getElementById('detayNot').textContent = seciliHasta.not;
      document.getElementById('arsivBtn').textContent = seciliHasta.arsiv ? 'ArĹźivden Ă‡Ä±kar' : 'ArĹźivle';
      document.getElementById('hastaDetay').style.display = 'block';
      document.getElementById('hastaFormu').style.display = 'none';
    }

    function duzenleHasta() {
      if (!seciliHasta) return;
      duzenlemeModu = true;
      duzenlenenId = seciliHasta.id;
      document.getElementById('hastaFormBaslik').textContent = 'Hasta DĂĽzenle';
      document.getElementById('hastaIsim').value = seciliHasta.isim;
      document.getElementById('hastaNot').value = seciliHasta.not;
      document.getElementById('hastaFormu').style.display = 'block';
      document.getElementById('hastaDetay').style.display = 'none';
    }

    function arsivleHasta() {
      if (!seciliHasta) return;
      seciliHasta.arsiv = !seciliHasta.arsiv;
      document.getElementById('hastaDetay').style.display = 'none';
      saveToStorage();
      renderHastalar();
    }

    function silHasta() {
      if (!seciliHasta) return;
      if (!confirm('Silmek istediÄźinize emin misiniz?')) return;
      hastalar = hastalar.filter(h => h.id !== seciliHasta.id);
      saveToStorage();
      document.getElementById('hastaDetay').style.display = 'none';
      renderHastalar();
    }

    function kapatDetay() {
      document.getElementById('hastaDetay').style.display = 'none';
    }


    // --- Hasta HaftalarÄ± ---
    function getHaftaListesi() {
      if (!seciliHasta) return [];
      if (!seciliHasta.haftalar) seciliHasta.haftalar = [];
      return seciliHasta.haftalar;
    }

    function haftaEkle() {
      if (!seciliHasta) return;
      if (!seciliHasta.haftalar) seciliHasta.haftalar = [];
      let startDate = null;
      if (seciliHasta.haftalar.length > 0) {
        // Son haftanÄ±n pazarÄ±ndan bir gĂĽn sonrasÄ±
        const last = seciliHasta.haftalar[seciliHasta.haftalar.length-1];
        startDate = new Date(new Date(last.baslangic).getTime() + 7*24*60*60*1000);
      } else {
        // Ä°lk hafta iĂ§in bugĂĽnĂĽn pazartesisi
        const now = new Date();
        const day = now.getDay();
        const diff = (day === 0 ? -6 : 1) - day; // Pazartesiye Ă§ek
        startDate = new Date(now.getFullYear(), now.getMonth(), now.getDate() + diff);
      }
      const endDate = new Date(startDate.getTime() + 6*24*60*60*1000);
      seciliHasta.haftalar.push({
        baslangic: startDate.toISOString().slice(0,10),
        bitis: endDate.toISOString().slice(0,10),
        aciklama: '',
        pdf: null,
        tarifKartlar: [],
        tarifler: [],
        gptMesaj: ''
      });
      saveToStorage();
      gosterHaftalar();
    }

    function gosterHaftalar() {
      const div = document.getElementById('haftaListesi');
      div.innerHTML = '';
      const haftalar = getHaftaListesi();
      haftalar.forEach((hafta, i) => {
        const haftaDiv = document.createElement('div');
        haftaDiv.style = 'border:1px solid #ccc; margin:8px 0; padding:8px; background:#f8f8ff;';
        haftaDiv.innerHTML =
          `<b>${i+1}. Hafta</b> (${hafta.baslangic} - ${hafta.bitis})
          <input type="text" id="aciklama_${i}" value="${hafta.aciklama||''}" placeholder="AĂ§Ä±klama" style="margin-left:8px;width:180px;">
          <button onclick="aciklamaKaydet(${i})">Kaydet</button>
          <button onclick="duzenleHafta(${i})">DĂĽzenle</button>
          <button onclick="silHafta(${i})" style="color:red;">Sil</button><br>
          <b>PDF:</b> <input type="file" accept="application/pdf" onchange="pdfYukleHafta(${i}, this)">
          <ul id="haftaTarifListesi_${i}" style="display:none;"></ul>
          <b>Tarif KartÄ± (manuel yĂĽkleme):</b> <input type="file" accept="image/jpeg,image/jpg,image/png" multiple onchange="tarifKartYukleHafta(${i}, this)">
          <div id="haftaKartGorsel_${i}"></div>
          <div id="eslesenKartlar_${i}"></div>

    // PDF'den otomatik tara ve eĹźleĹźtir
    async function pdfOkuVeEsleHafta(i) {
      const hafta = getHaftaListesi()[i];
      if (!hafta.pdf) return;
      const base64 = hafta.pdf.split(',')[1];
      const binary = atob(base64);
      const len = binary.length;
      const bytes = new Uint8Array(len);
      for (let j = 0; j < len; j++) bytes[j] = binary.charCodeAt(j);
      const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
      let fullText = '';
      for (let p = 1; p <= pdf.numPages; p++) {
        const page = await pdf.getPage(p);
        const content = await page.getTextContent();
        const strings = content.items.map(item => item.str);
        fullText += strings.join('\n') + '\n';
      }
      hafta.tarifler = extractTariflerDetay(fullText);
      saveToStorage();
      // Otomatik eĹźleĹźtir
      otomatikEsleHafta(i);
    }

    async function otomatikEsleHafta(i) {
  // Tarif satÄ±rÄ±ndan alternatifli yemek adlarÄ±nÄ± ayÄ±kla
  function extractYemekAdlari(satir) {
    // BaĹźtaki * ve miktarlarÄ± temizle
    let s = satir.replace(/^\*+\s*/, '');
    // Parantez iĂ§ini, + ile eklenenleri, miktarlarÄ± temizle
    s = s.replace(/\(.*?\)/g, '');
    s = s.replace(/\+.*$/, '');
    s = s.replace(/([0-9]+\s*(gram|gr|adet|yemek\s*kaĹźÄ±ÄźÄ±|tatlÄ±\s*kaĹźÄ±ÄźÄ±|su\s*bardaÄźÄ±|dilim|kase|Ă§ay\s*bardaÄźÄ±|bardak|kaĹźÄ±k|tbsp|tsp|ml|kg|g))($|\s)/gi, '');
    s = s.replace(/(istenilen baharatlarla|istenirse|isteÄźe baÄźlÄ±|arzuya gĂ¶re|isteÄźe gĂ¶re|isteÄźe baÄźlÄ± olarak|isteÄźe gĂ¶re baharat|isteÄźe gĂ¶re malzeme|isteÄźe gĂ¶re eklenebilir)/gi, '');
    
    // Ă–nce "ya da", "veya" ile ayrÄ±lmÄ±Ĺź alternatifleri ayÄ±r
    let alternatifler = s.split(/\s*(ya da|veya)\s*/i).map(a => a.trim()).filter(a => a.length > 0);
    let tumAdlar = [];
    
    // Her alternatif iĂ§in ayrÄ± iĹźlem yap
    alternatifler.forEach(alt => {
      // "ile", "iĂ§in", "ve" kelimelerini temizle
      alt = alt.replace(/\b(ile|iĂ§in|ve)\b/gi, '');
      // "/" ve "," ile ayrÄ±lmÄ±Ĺź alt seĂ§enekleri de ayÄ±r
      let adlar = alt.split(/\s*[\/|,]\s*/).map(a => a.trim()).filter(a => a.length > 0);
      // Sadece ana yemek adÄ±nÄ± ayÄ±kla: baĹźtaki ve sondaki boĹźluklarÄ±, miktarlarÄ±, "iĂ§in" ve fazlalÄ±klarÄ± sil
      adlar = adlar.map(a => a.replace(/^[0-9]+\s*/, '').replace(/\s*[0-9]+\s*(gram|gr|adet|dilim|kase|bardak|ml|kg|tsp|tbsp)?\s*$/i, '').replace(/\s*icin?$/i, '').replace(/\s*ile$/i, '').trim());
      // Ă‡ok kÄ±sa olanlarÄ± atma - sadece boĹź olanlarÄ± at
      adlar = adlar.filter(a => a.length > 0);
      tumAdlar = tumAdlar.concat(adlar);
    });
    
    return tumAdlar;
  }
  // Dosya adÄ±ndaki miktar ve aĂ§Ä±klama kelimelerini temizle
  function temizleDosyaAdi(ad) {
    let s = ad.replace(/\.(jpg|jpeg|png)$/i, '');
    s = s.replace(/_\d+(gr|gram|adet|dilim|kase|bardak|ml|kg|tsp|tbsp)?/gi, '');
    s = s.replace(/\(.*?\)/g, '');
    s = s.replace(/_?(istenilen_baharatlarla|istenirse|istege_bagli|arzuya_gore|istege_gore|istege_bagli_olarak|istege_gore_baharat|istege_gore_malzeme|istege_gore_eklenebilir)/gi, '');
    s = s.replace(/_+/g, '_');
    s = s.replace(/\s+/g, '_');
    s = s.replace(/\+.*$/, '');
    return s.trim();
  }
   // Normalize fonksiyonu - sembolleri ve TĂĽrkĂ§e karakterleri temizle
  function normalize(str) {
    return str
      .toLowerCase()
      .replace(/Ă§/g, 'c').replace(/Äź/g, 'g').replace(/Ĺź/g, 's')
      .replace(/ĂĽ/g, 'u').replace(/Ă¶/g, 'o').replace(/Ä±/g, 'i')
      .replace(/iĚ‡/g, 'i')
      .replace(/[_*\/()]/g, ' ')  // Sembolleri boĹźlukla deÄźiĹźtir
      .replace(/\s+/g, ' ')       // Ă‡oklu boĹźluklarÄ± tek boĹźluÄźa Ă§evir
      .replace(/[^a-z0-9\s]/g, '') // Sadece harf, rakam ve boĹźluk bÄ±rak
      .trim();
  }

  // Tarif kartÄ±ndaki TĂśM kelimelerin PDF yemeÄźinde ardÄ±ĹźÄ±k olarak bulunup bulunmadÄ±ÄźÄ±nÄ± kontrol et
  function kartKelimeleriniKontrolEt(kartKelimeler, tarifKelimeler) {
    if (kartKelimeler.length === 0) return false;
    
    // Kart kelimelerini birleĹźtir (ardÄ±ĹźÄ±k arama iĂ§in)

 // EÄźer gĂ¶rseller henĂĽz yĂĽklenmediyse, Ă¶nce yĂĽkle

  // Basit Levenshtein mesafesi (benzerlik iĂ§in)
  function levenshtein(a, b) {
    const matrix = Array(a.length + 1).fill(null).map(() => Array(b.length + 1).fill(null));
    for (let i = 0; i <= a.length; i++) matrix[i][0] = i;
    for (let j = 0; j <= b.length; j++) matrix[0][j] = j;
    for (let i = 1; i <= a.length; i++) {
      for (let j = 1; j <= b.length; j++) {
        const cost = a[i - 1] === b[j - 1] ? 0 : 1;
        matrix[i][j] = Math.min(
          matrix[i - 1][j] + 1,
          matrix[i][j - 1] + 1,
          matrix[i - 1][j - 1] + cost
        );
      }
    }
    return matrix[a.length][b.length];
  }

          if (Array.isArray(data)) {

            saveToStorage();
            renderHastalar();
            document.getElementById('hastaDetay').style.display = 'none';
            alert('Veriler baĹźarÄ±yla yĂĽklendi!');
          } else {
            alert('GeĂ§ersiz JSON formatÄ±!');
          }
        } catch(err) {
          alert('JSON okuma hatasÄ±: ' + err);
        }
      };
      reader.readAsText(file);
      event.target.value = '';
    }
    }

    function kopyalaGptMesaj(i) {
      const textarea = document.getElementById('gptMesaj_' + i);
      textarea.select();
      textarea.setSelectionRange(0, 99999); // mobile uyumlu
      document.execCommand('copy');
      alert('GPT mesajÄ± kopyalandÄ±!');
    }
    window.kopyalaGptMesaj = kopyalaGptMesaj;

    // Ortak fonksiyonlar
    function extractTariflerDetay(text) {
      // Her satÄ±rÄ± temizle, baĹźÄ±nda * veya miktar varsa da al
      const lines = text.split('\n').map(line => line.trim()).filter(l => l.length > 1);
      // SatÄ±r baĹźÄ±nda rakam, *, miktar, bĂĽyĂĽk harf, veya yemek adÄ± olabilecek her Ĺźeyi al
      const filtered = lines.filter(l =>
        /^[0-9]+\./.test(l) || // 1. ...
        /^\*/.test(l) || // * ...
        /^[0-9]+\s*(gram|gr|adet|yemek\s*kaĹźÄ±ÄźÄ±|tatlÄ±\s*kaĹźÄ±ÄźÄ±|su\s*bardaÄźÄ±|dilim|kase|Ă§ay\s*bardaÄźÄ±|bardak|kaĹźÄ±k|tbsp|tsp|ml|kg|g)/i.test(l) || // miktar ile baĹźlayan
        /^[A-ZÄ°ÄžĂśĹžĂ–Ă‡]/.test(l) // bĂĽyĂĽk harf ile baĹźlayan
      );
      // BaĹźtaki numara, * iĹźareti ve fazla boĹźluklarÄ± her zaman temizle
      return filtered.map(line =>
        line
          .replace(/^[0-9]+\.\s*/, '') // baĹźtaki numara
          .replace(/^\*+\s*/, '') // baĹźtaki yÄ±ldÄ±z
          .replace(/^([0-9]+\s*(gram|gr|adet|yemek\s*kaĹźÄ±ÄźÄ±|tatlÄ±\s*kaĹźÄ±ÄźÄ±|su\s*bardaÄźÄ±|dilim|kase|Ă§ay\s*bardaÄźÄ±|bardak|kaĹźÄ±k|tbsp|tsp|ml|kg|g)\s*)+/i, '') // baĹźtaki miktar
          .replace(/\s+/g, ' ') // fazla boĹźluk
          .trim()
          .toLowerCase()
      );
    }

    function normalizeNameDetay(name) {
      return name
        .toLowerCase()
        .replace(/Ă§/g, 'c').replace(/Äź/g, 'g').replace(/Ĺź/g, 's')
        .replace(/ĂĽ/g, 'u').replace(/Ă¶/g, 'o').replace(/Ä±/g, 'i')
        .replace(/\s+/g, '_')
        .replace(/[^a-z0-9_]/g, '');
    }

    // Hasta detayÄ±nÄ± gĂ¶sterirken haftalarÄ± ve genel notu da gĂ¶ster
    function hastaDetayGoster(id) {
      seciliHasta = hastalar.find(h => h.id === id);
      if (!seciliHasta) return;
      document.getElementById('detayIsim').textContent = seciliHasta.isim;
      document.getElementById('detayNot').textContent = seciliHasta.not;
      document.getElementById('arsivBtn').textContent = seciliHasta.arsiv ? 'ArĹźivden Ă‡Ä±kar' : 'ArĹźivle';
      document.getElementById('hastaDetay').style.display = 'block';
      document.getElementById('hastaFormu').style.display = 'none';
      document.getElementById('hastaGenelNot').textContent = seciliHasta.not;
      gosterHaftalar();
    }

    // Sayfa aĂ§Ä±lÄ±ĹźÄ±nda storage'dan yĂĽkle ve listele
    renderHastalar();

    async function zipEslesenGorseller(i) {
      const hafta = getHaftaListesi()[i];
      const eslesenDiv = document.getElementById('eslesenKartlar_' + i);
      const imgs = eslesenDiv.querySelectorAll('img');
      if (!imgs.length && !hafta.pdf && !(hafta.gptMesaj && hafta.gptMesaj.trim())) {
        alert('Ä°ndirilecek gĂ¶rsel, PDF veya mesaj yok!');
        return;
      }
      const zip = new JSZip();
      for (let img of imgs) {
        const url = img.src;
        const name = img.title || img.alt || 'gorsel.jpg';
        const response = await fetch(url);
        const blob = await response.blob();
        zip.file(name, blob);
      }
      // EÄźer hafta.pdf varsa, orijinal adÄ±yla ekle
      let zipName = 'eslesen_gorseller_hafta' + (i+1) + '.zip';
      if (hafta.pdfName) {
        const base64 = hafta.pdf.split(',')[1];
        zip.file(hafta.pdfName, base64, {base64: true});
        zipName = hafta.pdfName.replace(/\.[^.]+$/, '') + '.zip';
        // GPT mesajÄ± varsa, aynÄ± isimle .txt olarak ekle
        if (hafta.gptMesaj && hafta.gptMesaj.trim()) {
          const txtName = hafta.pdfName.replace(/\.[^.]+$/, '.txt');
          zip.file(txtName, hafta.gptMesaj);
        }
      } else if (hafta.gptMesaj && hafta.gptMesaj.trim()) {
        zip.file('gpt_mesaji.txt', hafta.gptMesaj);
      }
      zip.generateAsync({type:'blob'}).then(function(content) {
        saveAs(content, zipName);
      });
    }
    window.zipEslesenGorseller = zipEslesenGorseller;
  </script>
